name: Docker Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  docker-test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: workflows
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: docker build -t workflowos .

    - name: Run container
      run: |
        docker run -d -p 8000:8000 \
        -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/workflows \
        --name workflowos-test workflowos

    - name: Wait for API
      run: |
        for i in {1..20}; do
          if curl -s http://localhost:8000/health; then
            echo "API started"
            exit 0
          fi
          echo "Waiting..."
          sleep 3
        done

        docker logs workflowos-test
        exit 1