<!DOCTYPE html>
<html>

<head>

<title>WorkflowOS Plugins</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
padding:40px;
}

.card{

background:rgba(255,255,255,0.05);
padding:20px;
margin:20px 0;
border-radius:10px;

}

button{

padding:10px 15px;
border:none;
border-radius:8px;
background:#22c55e;
cursor:pointer;

}

</style>

</head>

<body>

<h1>Plugin Marketplace</h1>

<div id="plugins"></div>

<script>

async function loadPlugins(){

const res=await fetch("http://127.0.0.1:8000/plugins")

const data=await res.json()

const container=document.getElementById("plugins")

data.plugins.forEach(p=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`
<h3>${p.name}</h3>
<p>${p.description}</p>
<button onclick="addPlugin('${p.name}')">Add Node</button>
`

container.appendChild(div)

})

}

function addPlugin(name){

alert("Add plugin node: "+name)

}

loadPlugins()

</script>

</body>

</html>
