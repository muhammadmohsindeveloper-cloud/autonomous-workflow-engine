<!DOCTYPE html>
<html>

<head>

<title>WorkflowOS Builder</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
overflow:hidden;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
margin-right:10px;
transition:0.2s;
}

button:hover{
transform:scale(1.08);
}

/* BUTTON COLORS */

.save{
background:#22c55e;
box-shadow:0 0 10px #22c55e;
}

.run{
background:#3b82f6;
color:white;
box-shadow:0 0 10px #3b82f6;
}

/* WORKSPACE */

.workspace{
position:relative;
height:90vh;
}

/* CONNECTION LAYER */

#connections{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

/* NODE STYLE */

.node{

position:absolute;
padding:15px 20px;
border-radius:12px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);

cursor:pointer;

box-shadow:0 0 10px rgba(0,0,0,0.5);

transition:0.2s;

}

.node:hover{

transform:scale(1.08);
box-shadow:0 0 15px #22c55e;

}

.node.running{
box-shadow:0 0 20px #facc15;
}

.node.done{
box-shadow:0 0 20px #22c55e;
}

</style>

</head>

<body>

<div class="topbar">

<div id="pluginButtons">

<button onclick="addNode('send_email')">Email Node</button>
<button onclick="addNode('save_db')">DB Node</button>

</div>

<div>

<button class="save" onclick="saveWorkflow()">Save</button>
<button class="run" onclick="runWorkflow()">Run</button>

</div>

</div>

<div class="workspace" id="workspace">

<svg id="connections"></svg>

</div>

<script>

let nodes=[]
let edges=[]
let nodeCount=0
let selectedNode=null

/* ADD NODE */

function addNode(type){

nodeCount++

let node={
id:nodeCount,
type:type,
x:120+nodeCount*30,
y:120+nodeCount*20
}

nodes.push(node)

render()

}

/* RENDER */

function render(){

const workspace=document.getElementById("workspace")

workspace.querySelectorAll(".node").forEach(n=>n.remove())

nodes.forEach(node=>{

const div=document.createElement("div")

div.className="node"
div.id="node-"+node.id

div.style.left=node.x+"px"
div.style.top=node.y+"px"

div.innerText=node.type+" #"+node.id

div.onclick=()=>selectNode(node.id)

workspace.appendChild(div)

})

renderEdges()

}

/* SELECT NODE FOR CONNECTION */

function selectNode(id){

if(selectedNode==null){

selectedNode=id
return

}

if(selectedNode!=id){

edges.push({
from:selectedNode,
to:id
})

selectedNode=null

renderEdges()

}

}

/* DRAW EDGES */

function renderEdges(){

const svg=document.getElementById("connections")

svg.innerHTML=""

edges.forEach(edge=>{

const n1=nodes.find(n=>n.id===edge.from)
const n2=nodes.find(n=>n.id===edge.to)

const line=document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
)

line.setAttribute("x1",n1.x+50)
line.setAttribute("y1",n1.y+20)

line.setAttribute("x2",n2.x+50)
line.setAttribute("y2",n2.y+20)

line.setAttribute("stroke","#22c55e")
line.setAttribute("stroke-width","3")

svg.appendChild(line)

})

}

/* SAVE WORKFLOW */

async function saveWorkflow(){

const workflow={
nodes:nodes,
edges:edges
}

const res=await fetch("http://127.0.0.1:8000/workflows",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:"builder workflow",
definition:workflow
})

})

const data=await res.json()

alert("Workflow Saved ID: "+data.id)

}

/* EXECUTION ANIMATION */

function animateExecution(){

nodes.forEach((node,i)=>{

setTimeout(()=>{

let el=document.getElementById("node-"+node.id)

el.classList.add("running")

setTimeout(()=>{

el.classList.remove("running")
el.classList.add("done")

},700)

},i*1000)

})

}

/* RUN WORKFLOW */

async function runWorkflow(){

let id=prompt("Enter Workflow ID")

const res=await fetch(
"http://127.0.0.1:8000/webhook/"+id,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({})
}
)

const data=await res.json()

console.log(data)

animateExecution()

}

/* LOAD PLUGINS FROM API */

async function loadPlugins(){

const res=await fetch("http://127.0.0.1:8000/plugins")

const data=await res.json()

const container=document.getElementById("pluginButtons")

data.plugins.forEach(p=>{

const btn=document.createElement("button")

btn.innerText=p.name

btn.onclick=()=>addNode(p.name)

container.appendChild(btn)

})

}

loadPlugins()

</script>

</body>

</html>
